<ion-content class="glob-content-default-padding">
  <div class="ion-margin-bottom">
    <ion-row>
      <ion-col size="12" size-md="6" size-lg="3">
        <ion-card>
          <ion-searchbar />
        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12" size-md="6" size-lg="3">
        <div style="display: flex; gap: 10px;">
          <ion-button>
            <ion-icon src="assets/icons/outline/document-filter.svg" slot="start" />
            Filters
          </ion-button>

          <ion-button>
            <ion-icon src="assets/icons/outline/user-add.svg" slot="start" />
            Create User
          </ion-button>
        </div>
      </ion-col>
    </ion-row>
  </div>

  <ion-row>
    @for (item of [0,1,2,3,4,5,6,7]; track $index) {
    <ion-col size="12" size-md="6" size-lg="3">
      <ion-card class="user-card">
        <div class="header-container">
          <ion-avatar>
            <img alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
          </ion-avatar>

          <div class="text-container">
            <h2>
              Username
            </h2>

            <p>
              123456
            </p>
          </div>
        </div>

        <div class="content-container">
          <div class="item-details">
            <ion-icon src="assets/icons/outline/user-tick.svg" />
            Inactive
          </div>

          <div class="item-details">
            <ion-icon src="assets/icons/outline/clock.svg" />
            12 March 2026, 10:30 PM
          </div>

          <div class="btn-container">
            <ion-button size="small" expand="block">
              Details
            </ion-button>

            <ion-button size="small" expand="block">
              Change Status
            </ion-button>
          </div>
        </div>
      </ion-card>
    </ion-col>
    }
  </ion-row>
</ion-content>
